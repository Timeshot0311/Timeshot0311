<svg width="850" height="130" viewBox="0 0 850 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip">
      <rect width="850" height="130" rx="10"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#7C3AED" stroke-width="0.4" opacity="0.2"/>
    </pattern>
    <style>
      .scanline { animation: scan 4s linear infinite; }
      .title    { animation: pulse 3s ease-in-out infinite; }
      .sub      { animation: pulse 3s ease-in-out infinite 0.7s; }
      .cursor   { animation: blink 1s step-end infinite; }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.55; }
      }
      @keyframes scan {
        0%   { transform: translateY(-8px); }
        100% { transform: translateY(138px); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0; }
      }
    </style>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="850" height="130" fill="#0d1117"/>
    <!-- Pixel grid -->
    <rect width="850" height="130" fill="url(#grid)"/>

    <!-- Glow layer -->
    <text class="title" x="425" y="68" text-anchor="middle"
          font-family="'Courier New', monospace" font-size="40" font-weight="900"
          letter-spacing="6" fill="#7C3AED" filter="url(#glow)" opacity="0.55">SUHIL JUGROOP</text>
    <!-- Sharp layer -->
    <text class="title" x="425" y="68" text-anchor="middle"
          font-family="'Courier New', monospace" font-size="40" font-weight="900"
          letter-spacing="6" fill="#A78BFA">SUHIL JUGROOP</text>

    <!-- Subtitle -->
    <text class="sub" x="425" y="101" text-anchor="middle"
          font-family="'Courier New', monospace" font-size="12" font-weight="bold"
          letter-spacing="10" fill="#7C3AED">FULL STACK DEVELOPER</text>

    <!-- Blinking cursor -->
    <rect class="cursor" x="688" y="88" width="9" height="13" rx="1" fill="#7C3AED"/>

    <!-- Border -->
    <rect width="848" height="128" x="1" y="1" rx="9"
          fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.45"/>

    <!-- Scanline sweep -->
    <rect class="scanline" x="0" y="0" width="850" height="6" fill="#A78BFA" opacity="0.1"/>
  </g>
</svg>
